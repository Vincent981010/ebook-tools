<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>EPUB 繁體轉換與字詞替換工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 650px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* 規則輸入區樣式 */
        .rule-row { display: flex; gap: 10px; margin-bottom: 8px; }
        .rule-row input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        
        #dropZone { border: 3px dashed #b4b4d8; border-radius: 8px; padding: 40px 20px; text-align: center; background: #f9f9ff; color: #555; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s ease; margin-bottom: 20px; }
        #dropZone.dragover { background: #e1e1ff; border-color: #6666cc; }
        
        .btn-group { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn-wrapper { flex: 1; text-align: center; }
        .btn-wrapper label { display: block; background: #007bff; color: white; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-wrapper input[type="file"] { display: none; }
        
        #log { background: #333; color: #0f0; padding: 12px; height: 300px; overflow-y: auto; font-family: monospace; font-size: 13px; border-radius: 6px; }
    </style>
</head>
<body>
<div class="container">
    <h3>EPUB 繁體轉換與字詞替換</h3>
    
    <div id="rulesContainer">
        <div class="rule-row">
            <input type="text" class="find-input" placeholder="欲替換字詞">
            <input type="text" class="replace-input" placeholder="替換為">
        </div>
    </div>
    <button onclick="addRule()" style="width: 100%; padding: 8px; margin-bottom: 20px;">+ 新增替換規則</button>

    <div id="dropZone">請將 EPUB 檔案或資料夾拖曳至此處</div>
    
    <div class="btn-group">
        <div class="btn-wrapper">
            <label for="fileInput">📄 選擇多個檔案</label>
            <input type="file" id="fileInput" accept=".epub" multiple>
        </div>
        <div class="btn-wrapper">
            <label for="folderInput" style="background: #28a745;">📂 選擇整個資料夾</label>
            <input type="file" id="folderInput" webkitdirectory directory multiple>
        </div>
    </div>

    <div id="log">系統準備就緒...</div>
</div>

<script>
    const logEl = document.getElementById('log');
    function log(m) { logEl.innerText += '\n' + m; logEl.scrollTop = logEl.scrollHeight; }
    const converter = OpenCC.Converter({ from: 'cn', to: 'twp' });

    function addRule() {
        const div = document.createElement('div');
        div.className = 'rule-row';
        div.innerHTML = `<input type="text" class="find-input" placeholder="欲替換字詞"><input type="text" class="replace-input" placeholder="替換為">`;
        document.getElementById('rulesContainer').appendChild(div);
    }

    function getRules() {
        return Array.from(document.querySelectorAll('.rule-row'))
            .map(row => ({
                find: row.querySelector('.find-input').value,
                replace: row.querySelector('.replace-input').value
            })).filter(r => r.find);
    }

    // 處理 EPUB 內容
    async function processSingleEpub(file) {
        const rules = getRules();
        const zip = await new JSZip().loadAsync(file);
        const newZip = new JSZip();

        for (const [path, entry] of Object.entries(zip.files)) {
            if (entry.dir) { newZip.folder(path); continue; }
            
            const isText = /\.(html|xhtml|htm|ncx|opf|xml|txt|css)$/i.test(path);
            if (isText) {
                let content = await entry.async("string");
                // 1. 自訂詞彙替換
                rules.forEach(r => content = content.split(r.find).join(r.replace));
                // 2. OpenCC 繁簡轉換
                content = converter(content);
                newZip.file(path, content);
            } else {
                newZip.file(path, await entry.async("blob"));
            }
        }
        return await newZip.generateAsync({ type: "blob" });
    }

    // 統一處理邏輯
    async function handleExecution(itemsArray, isFolderMode, rootName) {
        log(`🚀 開始處理 ${itemsArray.length} 個項目...`);
        for (const item of itemsArray) {
            try {
                log(`處理中: ${item.relPath || item.file.name}`);
                const blob = await processSingleEpub(item.file);
                if (!isFolderMode) {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = converter(item.file.name);
                    a.click();
                } else {
                    // 若是資料夾模式，這裡可依您的需求調整打包邏輯
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = converter(item.file.name);
                    a.click();
                }
            } catch (err) { log(`❌ 失敗: ${err.message}`); }
        }
        log("✅ 完成！");
    }

    // 拖曳與按鈕綁定
    const dropZone = document.getElementById('dropZone');
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
    dropZone.ondragleave = () => dropZone.classList.remove('dragover');
    dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); /* 實作 traverseEntry 邏輯 */ };
    
    document.getElementById('fileInput').onchange = (e) => handleExecution(Array.from(e.target.files).map(f => ({file: f, relPath: f.name})), false);
</script>
</body>
</html>
