<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>EPUB 繁體轉換工具 (保留原始結構)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 650px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #dropZone { border: 3px dashed #b4b4d8; border-radius: 8px; padding: 40px 20px; text-align: center; background: #f9f9ff; margin-bottom: 20px; cursor: pointer; }
        #log { background: #333; color: #0f0; padding: 12px; height: 380px; overflow-y: auto; font-family: monospace; font-size: 13px; border-radius: 6px; }
    </style>
</head>
<body>
<div class="container">
    <h3>EPUB 繁體轉換</h3>
    <div id="dropZone">請將【EPUB 檔案】拖曳至此處</div>
    <div id="log">系統準備就緒...</div>
</div>

<script>
    const logEl = document.getElementById('log');
    function log(m) { logEl.innerText += '\n' + m; logEl.scrollTop = logEl.scrollHeight; }

    // 取得轉換器
    const converter = OpenCC.Converter({ from: 'cn', to: 'twp' });

    async function processEpub(file) {
        const zip = await new JSZip().loadAsync(file);
        const newZip = new JSZip();

        // 遍歷 zip 內所有檔案，重點：不改變檔名，只改變內容
        for (const [path, entry] of Object.entries(zip.files)) {
            if (entry.dir) {
                newZip.folder(path);
                continue;
            }

            const content = await entry.async("string");
            
            // 判斷是否為文字檔，如果是則進行內容簡繁轉換
            const isText = /\.(html|xhtml|htm|ncx|opf|xml|txt|css)$/i.test(path);
            
            if (isText) {
                const convertedContent = converter(content);
                newZip.file(path, convertedContent);
            } else {
                // 非文字檔（圖片等）直接複製
                const blob = await entry.async("blob");
                newZip.file(path, blob);
            }
        }
        return await newZip.generateAsync({ type: "blob", mimeType: "application/epub+zip" });
    }

    const dropZone = document.getElementById('dropZone');
    dropZone.ondrop = async (e) => {
        e.preventDefault();
        const files = Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.epub'));
        
        for (const file of files) {
            log(`正在處理: ${file.name}`);
            try {
                const blob = await processEpub(file);
                // 最終下載的檔名才進行簡轉繁
                const newName = converter(file.name);
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = newName;
                a.click();
                log(`✅ 完成: ${newName}`);
            } catch (err) {
                log(`❌ 失敗: ${file.name} - ${err.message}`);
            }
        }
    };
    dropZone.ondragover = (e) => e.preventDefault();
</script>
</body>
</html>
