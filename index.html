<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>EPUB 繁體轉換與字詞替換工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 650px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #dropZone { border: 3px dashed #b4b4d8; border-radius: 8px; padding: 40px 20px; text-align: center; background: #f9f9ff; margin-bottom: 20px; cursor: pointer; color: #555; }
        .btn-group { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn-wrapper { flex: 1; text-align: center; }
        .btn-wrapper label { display: block; background: #007bff; color: white; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-wrapper input { display: none; }
        .rule-row { display: flex; gap: 10px; margin-bottom: 8px; }
        .rule-row input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        #log { background: #333; color: #0f0; padding: 12px; height: 300px; overflow-y: auto; font-family: monospace; font-size: 13px; border-radius: 6px; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h3>EPUB 繁體轉換與字詞替換</h3>
    <div id="rulesContainer">
        <div class="rule-row">
            <input type="text" class="find-input" placeholder="要被換掉的字詞">
            <input type="text" class="replace-input" placeholder="換成新的字詞">
        </div>
    </div>
    <button onclick="addRule()" style="width: 100%; padding: 8px; margin-bottom: 20px;">+ 新增替換規則</button>
    <div id="dropZone">將 EPUB 檔案或【整個書庫資料夾】拖曳至此處</div>
    <div class="btn-group">
        <div class="btn-wrapper">
            <label for="fileInput">📄 選擇多個檔案</label>
            <input type="file" id="fileInput" accept=".epub" multiple>
        </div>
        <div class="btn-wrapper">
            <label for="folderInput" style="background: #28a745;">📂 選擇整個資料夾</label>
            <input type="file" id="folderInput" webkitdirectory directory multiple>
        </div>
    </div>
    <div id="log">系統準備就緒...</div>
</div>

<script>
    const logEl = document.getElementById('log');
    function log(m) { logEl.innerText += '\n' + m; logEl.scrollTop = logEl.scrollHeight; }
    const converter = OpenCC.Converter({ from: 'cn', to: 'twp' });

    function addRule() {
        const div = document.createElement('div');
        div.className = 'rule-row';
        div.innerHTML = `<input type="text" class="find-input" placeholder="要被換掉的字詞"><input type="text" class="replace-input" placeholder="換成新的字詞">`;
        document.getElementById('rulesContainer').appendChild(div);
    }

    async function processSingleEpub(file) {
        const rules = Array.from(document.querySelectorAll('.rule-row')).map(r => ({
            find: r.querySelector('.find-input').value,
            replace: r.querySelector('.replace-input').value
        })).filter(r => r.find);

        const zip = await new JSZip().loadAsync(file);
        const newZip = new JSZip();

        for (const [path, entry] of Object.entries(zip.files)) {
            if (entry.dir) { newZip.folder(path); continue; }
            const isText = /\.(html|xhtml|htm|ncx|opf|xml|txt|css)$/i.test(path);
            if (isText) {
                let content = await entry.async("string");
                rules.forEach(r => content = content.split(r.find).join(r.replace));
                newZip.file(path, converter(content));
            } else {
                newZip.file(path, await entry.async("blob"));
            }
        }
        return await newZip.generateAsync({ type: "blob" });
    }

    async function handleExecution(itemsArray, isFolderMode, rootName) {
        log(`🚀 開始處理 ${itemsArray.length} 個項目...`);
        if (isFolderMode) {
            const masterZip = new JSZip();
            for (const item of itemsArray) {
                const blob = await processSingleEpub(item.file);
                masterZip.file(item.relPath, blob);
            }
            const finalBlob = await masterZip.generateAsync({ type: "blob" });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(finalBlob);
            a.download = `${converter(rootName)}_TW.zip`;
            a.click();
        } else {
            for (const item of itemsArray) {
                const blob = await processSingleEpub(item.file);
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = converter(item.file.name);
                a.click();
            }
        }
        log("✅ 所有任務完成！");
    }

    // 拖曳處理邏輯 (遞迴掃描)
    const dropZone = document.getElementById('dropZone');
    dropZone.ondragover = (e) => e.preventDefault();
    dropZone.ondrop = async (e) => {
        e.preventDefault();
        const items = e.dataTransfer.items;
        const itemsArray = [];
        async function traverse(entry, path) {
            if (entry.isFile && entry.name.endsWith('.epub')) {
                const file = await new Promise(r => entry.file(r));
                itemsArray.push({ file, relPath: path + entry.name });
            } else if (entry.isDirectory) {
                const reader = entry.createReader();
                const entries = await new Promise(r => reader.readEntries(r));
                for (const e of entries) await traverse(e, path + entry.name + "/");
            }
        }
        for (let i = 0; i < items.length; i++) await traverse(items[i].webkitGetAsEntry(), "");
        await handleExecution(itemsArray, true, "EPUB_Collection");
    };

    document.getElementById('fileInput').onchange = (e) => handleExecution(Array.from(e.target.files).map(f => ({file: f, relPath: f.name})), false);
    document.getElementById('folderInput').onchange = (e) => {
        const files = Array.from(e.target.files).filter(f => f.name.endsWith('.epub'));
        handleExecution(files.map(f => ({file: f, relPath: f.webkitRelativePath})), true, files[0].webkitRelativePath.split('/')[0]);
    };
</script>
</body>
</html>
