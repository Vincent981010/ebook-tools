<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>EPUB 繁體轉換工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 650px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* 拖曳專用落點區域 */
        #dropZone {
            border: 3px dashed #b4b4d8;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            background: #f9f9ff;
            color: #555;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 20px;
        }
        #dropZone.dragover {
            background: #e1e1ff;
            border-color: #6666cc;
            color: #222;
        }
        
        .btn-group { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn-wrapper { flex: 1; text-align: center; }
        .btn-wrapper label { display: block; background: #007bff; color: white; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; transition: background 0.2s; }
        .btn-wrapper label:hover { background: #0056b3; }
        .btn-wrapper input[type="file"] { display: none; }
        .btn-wrapper .hint { font-size: 11px; color: #666; margin-top: 5px; display: block; }
        
        #log { background: #333; color: #0f0; padding: 12px; height: 380px; overflow-y: auto; font-family: monospace; font-size: 13px; line-height: 1.5; border-radius: 6px; }
    </style>
</head>
<body>
<div class="container">
    <h3>EPUB 繁體轉換</h3>
    
    <div id="dropZone">
        動態拖曳區：請將【多個 EPUB 檔案】或【整個書庫資料夾】拖曳到這裡
        <div style="font-size: 12px; color: #888; font-weight: normal; margin-top: 8px;">(支援資料夾內含多層子資料夾的深度掃描)</div>
    </div>
    
    <div class="btn-group">
        <div class="btn-wrapper">
            <label for="fileInput">📄 點擊選擇多個檔案</label>
            <input type="file" id="fileInput" accept=".epub" multiple>
            <span class="hint">適合分散的獨立電子書</span>
        </div>
        <div class="btn-wrapper">
            <label for="folderInput" style="background: #28a745;">📂 點擊選擇整個資料夾</label>
            <input type="file" id="folderInput" webkitdirectory directory multiple>
            <span class="hint">透過瀏覽器選單選擇單一目錄</span>
        </div>
    </div>

    <div id="log">系統準備就緒... (請將資料夾拖入上方，或點擊按鈕開始轉換)</div>
</div>

<script>
    const logEl = document.getElementById('log');
    function log(m) { logEl.innerText += '\n' + m; logEl.scrollTop = logEl.scrollHeight; }

    const urlPattern = /([a-zA-Z0-9_:-]*(?:href|src))\s*=\s*(['"])(.*?)\2/gi;
    const xmlEncPattern = /(<\?xml[^>]+encoding\s*=\s*['"])[a-zA-Z0-9\-]+(['"])/gi;
    const metaEncPattern = /(<meta[^>]+charset\s*=\s*['"]?)[a-zA-Z0-9\-]+(['"]?)/gi;

    // 核心 EPUB 轉換邏輯
    async function processSingleEpub(file, converter) {
        const zip = await new JSZip().loadAsync(file);
        const newZip = new JSZip();

        if (zip.files['mimetype']) {
            const mimeContent = await zip.file('mimetype').async('string');
            newZip.file('mimetype', mimeContent);
        }

        for (const [path, entry] of Object.entries(zip.files)) {
            if (entry.dir || path === 'mimetype') continue;

            const isTextFile = path.match(/\.(html|xhtml|htm|ncx|opf|xml|txt|css)$/i);
            // 轉換檔名
            const newPath = converter(path);

            if (isTextFile) {
                let content = await entry.async("string");

                content = content.replace(urlPattern, (match, attr, quote, urlVal) => {
                    try { return `${attr}=${quote}${decodeURIComponent(urlVal)}${quote}`; } 
                    catch (err) { return match; }
                });

                // 轉換內容
                content = converter(content);

                content = content.replace(xmlEncPattern, "$1utf-8$2");
                content = content.replace(metaEncPattern, "$1utf-8$2");

                newZip.file(newPath, content);
            } else {
                newZip.file(newPath, await entry.async("blob"));
            }
        }
        return await newZip.generateAsync({ type: "blob", mimeType: "application/epub+zip" });
    }

    function checkOpenCC() {
        if (typeof OpenCC === 'undefined') {
            log("❌ 錯誤：OpenCC 尚未載入，請稍後再試或檢查網路連線。");
            return null;
        }
        return OpenCC.Converter({ from: 'cn', to: 'twp' });
    }

    async function handleExecution(itemsArray, isFolderMode, defaultPackageName) {
        const converter = checkOpenCC();
        if (!converter) return;

        if (itemsArray.length === 0) {
            log("❌ 未偵測到任何有效的 .epub 檔案。");
            return;
        }

        log("==================================================");
        if (isFolderMode) {
            // 轉換根目錄名稱
            const translatedRootName = converter(defaultPackageName) + "_TW";
            log(`📂 偵測到資料夾結構，共有 ${itemsArray.length} 本 EPUB 檔案。`);
            log(`📦 系統將自動打包並維持原完整目錄結構至：${translatedRootName}.zip`);

            const masterZip = new JSZip();
            for (const item of itemsArray) {
                log(`🚀 深度處理中: ${item.relPath}`);
                try {
                    const convertedBlob = await processSingleEpub(item.file, converter);
                    const pathParts = item.relPath.split('/');
                    pathParts[0] = translatedRootName;
                    for (let i = 1; i < pathParts.length; i++) {
                        pathParts[i] = converter(pathParts[i]);
                    }
                    const translatedRelPath = pathParts.join('/');
                    masterZip.file(translatedRelPath, convertedBlob);
                    log(`✅ 已排入: ${translatedRelPath}`);
                } catch (err) { log(`❌ 轉換失敗: ${item.relPath} (${err.message})`); }
            }

            const masterBlob = await masterZip.generateAsync({ type: "blob" });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(masterBlob);
            a.download = `${translatedRootName}.zip`;
            a.click();
            log(`🎉 【全部轉換完成】下載檔名：${translatedRootName}.zip`);
        } else {
            for (const item of itemsArray) {
                log(`🚀 正在處理: ${item.file.name}`);
                try {
                    const convertedBlob = await processSingleEpub(item.file, converter);
                    const translatedFileName = converter(item.file.name);
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(convertedBlob);
                    a.download = translatedFileName;
                    a.click();
                    log(`🎉 轉換完成！下載: ${translatedFileName}`);
                } catch (err) { log(`❌ 轉換失敗: ${item.file.name} (${err.message})`); }
            }
        }
    }

    // 拖曳處理...
    const dropZone = document.getElementById('dropZone');
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
    dropZone.ondragleave = () => { dropZone.classList.remove('dragover'); };
    dropZone.ondrop = async (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const items = e.dataTransfer.items;
        const itemsArray = [];
        let hasFolder = false;
        let rootName = "EPUB_Folder";

        async function traverseEntry(entry, currentPath) {
            if (entry.isFile) {
                if (entry.name.toLowerCase().endsWith('.epub')) {
                    const file = await new Promise((res, rej) => entry.file(res, rej));
                    itemsArray.push({ file: file, relPath: currentPath + entry.name });
                }
            } else if (entry.isDirectory) {
                hasFolder = true;
                const reader = entry.createReader();
                const entries = await new Promise((res) => {
                    let all = [];
                    function read() { reader.readEntries((r) => { if(r.length===0) res(all); else { all=all.concat(r); read(); } }); }
                    read();
                });
                for (const child of entries) await traverseEntry(child, currentPath + entry.name + "/");
            }
        }

        for (let i = 0; i < items.length; i++) {
            const entry = items[i].webkitGetAsEntry();
            if (entry) {
                if (entry.isDirectory && i === 0) rootName = entry.name;
                await traverseEntry(entry, "");
            }
        }
        await handleExecution(itemsArray, hasFolder, rootName);
    };

    document.getElementById('fileInput').onchange = async (e) => {
        const files = Array.from(e.target.files).filter(f => f.name.toLowerCase().endsWith('.epub'));
        const itemsArray = files.map(f => ({ file: f, relPath: f.name }));
        await handleExecution(itemsArray, false, "");
        e.target.value = "";
    };

    document.getElementById('folderInput').onchange = async (e) => {
        const files = Array.from(e.target.files).filter(f => f.name.toLowerCase().endsWith('.epub'));
        if (files.length === 0) return;
        let rootName = files[0].webkitRelativePath ? files[0].webkitRelativePath.split('/')[0] : "EPUB_Folder";
        const itemsArray = files.map(f => ({ file: f, relPath: f.webkitRelativePath || f.name }));
        await handleExecution(itemsArray, true, rootName);
        e.target.value = "";
    };
</script>
</body>
</html>
