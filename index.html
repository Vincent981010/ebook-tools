<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>EPUB 繁體轉換與字詞替換工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 650px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        #dropZone {
            border: 3px dashed #b4b4d8;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            background: #f9f9ff;
            color: #555;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }
        
        .rule-row { display: flex; gap: 10px; margin-bottom: 8px; }
        .rule-row input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        
        .btn-group { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn-wrapper { flex: 1; text-align: center; }
        .btn-wrapper label { display: block; background: #007bff; color: white; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        #log { background: #333; color: #0f0; padding: 12px; height: 300px; overflow-y: auto; font-family: monospace; font-size: 13px; border-radius: 6px; }
    </style>
</head>
<body>
<div class="container">
    <h3>EPUB 繁體與字詞替換工具</h3>
    
    <div id="rulesContainer">
        <div class="rule-row">
            <input type="text" class="find-input" placeholder="要被換掉的字詞">
            <input type="text" class="replace-input" placeholder="換成新的字詞">
        </div>
    </div>
    <button onclick="addRule()" style="width: 100%; padding: 8px; margin-bottom: 20px;">+ 新增替換規則</button>

    <div id="dropZone">請將 EPUB 檔案拖曳至此處開始執行</div>
    
    <div id="log">系統準備就緒...</div>
</div>

<script>
    const logEl = document.getElementById('log');
    function log(m) { logEl.innerText += '\n' + m; logEl.scrollTop = logEl.scrollHeight; }

    // 初始化 OpenCC 轉換器 (簡轉繁)
    const converter = OpenCC.Converter({ from: 'cn', to: 'twp' });

    function addRule() {
        const div = document.createElement('div');
        div.className = 'rule-row';
        div.innerHTML = `<input type="text" class="find-input" placeholder="要被換掉的字詞"><input type="text" class="replace-input" placeholder="換成新的字詞">`;
        document.getElementById('rulesContainer').appendChild(div);
    }

    function getRules() {
        const rules = [];
        document.querySelectorAll('.rule-row').forEach(row => {
            const find = row.querySelector('.find-input').value;
            const replace = row.querySelector('.replace-input').value;
            if (find) rules.push({ find, replace });
        });
        return rules;
    }

    // 核心處理邏輯：嚴格保持檔案路徑，只修改內容
    async function processEpub(file) {
        const rules = getRules();
        const zip = await new JSZip().loadAsync(file);
        const newZip = new JSZip();

        for (const [path, entry] of Object.entries(zip.files)) {
            // 關鍵：如果是資料夾，直接創建，不更動路徑名稱
            if (entry.dir) {
                newZip.folder(path);
                continue;
            }

            // 判斷是否為文字檔，才進行處理
            const isText = /\.(html|xhtml|htm|ncx|opf|xml|txt|css)$/i.test(path);
            
            if (isText) {
                let content = await entry.async("string");
                
                // 1. 先做字詞替換
                rules.forEach(r => {
                    content = content.split(r.find).join(r.replace);
                });
                // 2. 再做 OpenCC 繁體轉換
                content = converter(content);
                
                newZip.file(path, content);
            } else {
                // 非文字檔（如圖片），直接複製二進位資料，確保書本架構不壞損
                const blob = await entry.async("blob");
                newZip.file(path, blob);
            }
        }
        return await newZip.generateAsync({ type: "blob", mimeType: "application/epub+zip" });
    }

    const dropZone = document.getElementById('dropZone');
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.background = '#e1e1ff'; };
    dropZone.ondragleave = () => { dropZone.style.background = '#f9f9ff'; };
    
    dropZone.ondrop = async (e) => {
        e.preventDefault();
        dropZone.style.background = '#f9f9ff';
        const files = Array.from(e.dataTransfer.files).filter(f => f.name.toLowerCase().endsWith('.epub'));
        
        for (const file of files) {
            log(`正在處理: ${file.name}`);
            try {
                const blob = await processEpub(file);
                // 只有在最後下載時，才轉換檔名
                const newName = converter(file.name);
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = newName;
                a.click();
                log(`✅ 完成並下載: ${newName}`);
            } catch (err) {
                log(`❌ 失敗: ${file.name} - ${err.message}`);
                console.error(err);
            }
        }
    };
</script>
</body>
</html>
