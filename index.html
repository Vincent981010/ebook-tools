<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPUB / TXT 字詞大量替換與繁簡轉換工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.min.js"></script>
    <style>
        :root {
            --primary-color: #4a90e2;
            --danger-color: #e06c75;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .mode-select {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        .mode-label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-weight: normal;
        }
        input[type="file"] {
            width: 100%;
            padding: 15px;
            border: 2px dashed #ccc;
            border-radius: 6px;
            cursor: pointer;
            box-sizing: border-box;
            background: #fafafa;
        }
        .rule-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .rule-row input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-add {
            background-color: #e1ecf4;
            color: #39739d;
            border: 1px solid #7aa7c7;
            width: 100%;
            margin-top: 5px;
        }
        .btn-add:hover { background-color: #d0e3f0; }
        .btn-delete {
            background-color: var(--danger-color);
            color: white;
            padding: 8px 12px;
        }
        .btn-delete:hover { background-color: #d15963; }
        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            width: 100%;
            font-size: 16px;
            padding: 12px;
            margin-top: 25px;
            border-radius: 6px;
        }
        .btn-submit:hover { background-color: #357abd; }
        .btn-submit:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            display: none;
            white-space: pre-line;
            line-height: 1.5;
        }
        .info { background-color: #e3f2fd; color: #0d47a1; }
        .success { background-color: #e8f5e9; color: #1b5e20; }
        .error { background-color: #ffebee; color: #c62828; }
        /* 新增的 OpenCC 樣式 */
        .opencc-container {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary-color);
        }
        .opencc-container select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
    </style>
</head>

                <input type="radio" name="uploadMode" value="folder" onchange="toggleMode()"> 整個資料夾 (含子資料夾)
            </label>
        </div>
