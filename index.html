<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>EPUB 繁體轉換與字詞替換工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 650px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .rule-row { display: flex; gap: 10px; margin-bottom: 8px; }
        .rule-row input { flex: 1; padding: 5px; }
        #dropZone { border: 3px dashed #b4b4d8; padding: 30px; text-align: center; background: #f9f9ff; margin: 20px 0; cursor: pointer; }
        #log { background: #333; color: #0f0; padding: 10px; height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <h3>EPUB 轉換工具（字詞替換 + 簡轉繁）</h3>
    
    <div id="rulesContainer">
        <div class="rule-row">
            <input type="text" class="find-input" placeholder="欲替換字詞">
            <input type="text" class="replace-input" placeholder="新字詞">
        </div>
    </div>
    <button onclick="addRule()">+ 新增規則</button>

    <div id="dropZone">將 EPUB 檔案拖曳至此處開始執行</div>
    <div id="log">系統就緒...</div>
</div>

<script>
    const logEl = document.getElementById('log');
    function log(m) { logEl.innerText += '\n' + m; logEl.scrollTop = logEl.scrollHeight; }

    function addRule() {
        const div = document.createElement('div');
        div.className = 'rule-row';
        div.innerHTML = `<input type="text" class="find-input" placeholder="欲替換字詞"><input type="text" class="replace-input" placeholder="新字詞">`;
        document.getElementById('rulesContainer').appendChild(div);
    }

    const converter = OpenCC.Converter({ from: 'cn', to: 'twp' });

    function getRules() {
        const rules = [];
        document.querySelectorAll('.rule-row').forEach(row => {
            const find = row.querySelector('.find-input').value;
            const replace = row.querySelector('.replace-input').value;
            if (find) rules.push({ find, replace });
        });
        return rules;
    }

    async function processEpub(file) {
        const rules = getRules();
        const zip = await new JSZip().loadAsync(file);
        const newZip = new JSZip();

        for (const [path, entry] of Object.entries(zip.files)) {
            if (entry.dir) { newZip.folder(path); continue; }

            const content = await entry.async("string");
            const isText = /\.(html|xhtml|htm|ncx|opf|xml|txt|css)$/i.test(path);
            
            if (isText) {
                // 1. 先執行自訂字詞替換
                let processedContent = content;
                rules.forEach(r => {
                    processedContent = processedContent.split(r.find).join(r.replace);
                });
                // 2. 再執行 OpenCC 簡轉繁
                processedContent = converter(processedContent);
                
                newZip.file(path, processedContent);
            } else {
                newZip.file(path, await entry.async("blob"));
            }
        }
        return await newZip.generateAsync({ type: "blob", mimeType: "application/epub+zip" });
    }

    const dropZone = document.getElementById('dropZone');
    dropZone.ondrop = async (e) => {
        e.preventDefault();
        const files = Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.epub'));
        for (const file of files) {
            log(`處理中: ${file.name}`);
            try {
                const blob = await processEpub(file);
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = converter(file.name); // 檔名最後才轉繁
                a.click();
                log(`✅ 完成: ${file.name}`);
            } catch (err) { log(`❌ 錯誤: ${err.message}`); }
        }
    };
    dropZone.ondragover = (e) => e.preventDefault();
</script>
</body>
</html>
